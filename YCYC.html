<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Velocity</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    user-select: none;
}
canvas {
    display: block;
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const mouse = { x: w / 2, y: h / 2 };
let mouseDown = false;

window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("mousedown", () => mouseDown = true);
window.addEventListener("mouseup", () => mouseDown = false);

const colors = ['#FF0000', '#0000FF', '#FFFFFF'];
const particles = [];
const COUNT = 1000;

function rand(a, b) { return Math.random() * (b - a) + a; }

for (let i = 0; i < COUNT; i++) {
  particles.push({
    x: rand(0, w),
    y: rand(0, h),
    vx: rand(-6, 6),
    vy: rand(-6, 6),
    size: rand(1, 3),
    color: colors[Math.floor(Math.random() * colors.length)]
  });
}

// Explosive click
window.addEventListener("click", e => {
  particles.forEach(p => {
    const dx = p.x - e.clientX;
    const dy = p.y - e.clientY;
    const d = Math.hypot(dx, dy) + 1;
    if (d < 400) {
      p.vx += (dx / d) * 40;
      p.vy += (dy / d) * 40;
    }
  });
});

function animate() {
  requestAnimationFrame(animate);
  
  // Trails
  ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
  ctx.fillRect(0, 0, w, h);

  const attract = mouseDown ? 0.6 : 0.08;
  const orbit = mouseDown ? 0.3 : 0.08;

  for (const p of particles) {
    const dx = mouse.x - p.x;
    const dy = mouse.y - p.y;
    const dist = Math.hypot(dx, dy) + 1;

    p.vx += (dx / dist) * attract;
    p.vy += (dy / dist) * attract;
    p.vx += -dy / dist * orbit;
    p.vy += dx / dist * orbit;

    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;

    if (p.x < 0) p.x += w;
    if (p.x > w) p.x -= w;
    if (p.y < 0) p.y += h;
    if (p.y > h) p.y -= h;

    // Glowing style
    ctx.shadowBlur = 15;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Connections
  ctx.shadowBlur = 0;
  const connectDist = mouseDown ? 180 : 80;
  
  for (let i = 0; i < particles.length; i += 5) {
    for (let j = i + 1; j < particles.length; j += 6) {
      const a = particles[i];
      const b = particles[j];
      const d = Math.hypot(a.x - b.x, a.y - b.y);

      if (d < connectDist) {
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 - d / connectDist})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }
}
animate();
</script>
</body>
</html>
